<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&family=Oswald:wght@300;400;500;700&display=swap" rel="stylesheet">
        <title>Contact Ash Askin</title>
    </head>
    <body>
        <h1>Contact Ash Askin</h1>
        <div class="form"></div>
            <p>Feel free to get in touch using the form below!</p>
            <input type="text" name="Your name" class="texts"/>Your name
            <br />
            <input type="email" name "Your email address" />Your email address
            <br />
            <p>Reason for contacting</p>
            <input type="radio" name="contactreason" value="Work Commission" checked="checked" /> Work Commission
            <br />
            <input type="radio" name="contactreason" value="General Support" /> General Support
            <br />
            <input type="radio" name="contactreason" value="Just to say hi!" /> Just to say hi!
            <br />
            <br />
            <textarea name="comments" placeholder="Any additional comments?"></textarea>
        </div>
    </body>
</html>
